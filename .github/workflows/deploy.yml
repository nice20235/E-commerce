name: Deploy to VPS

on:
  push:
    branches: [main, master]

jobs:
  # ──────────────────────────────
  # 1. Backend deploy
  # ──────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: SSH → git pull → restart
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/backend/StepUp
            git pull
            source venv/bin/activate
            pip install -r requirements.txt
            systemctl restart backend

  # ──────────────────────────────
  # 2. Frontend build + deploy
  # ──────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Install dependencies
        working-directory: FrontEnd
        run: npm ci

      - name: Build
        working-directory: FrontEnd
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      # Copy built files to VPS
      # VPS_FRONTEND_PATH — nginx root papkasi, masalan: /var/www/frontend/dist
      # Qanday topish: VPS'da → grep -r "root" /etc/nginx/sites-enabled/
      - name: Upload dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "FrontEnd/dist/."
          target: ${{ secrets.VPS_FRONTEND_PATH }}
          overwrite: true
